workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.austinphillips.thicket
      groups:
        - plantnet
        - perenual
        - openweather
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      # Home screen widget build step disabled for now - see
      # ios/scripts/add_widget_target.rb and the "Later" section of the
      # project roadmap. Re-enable once ready to actually ship it:
      #   - name: Add ThicketWidgetExtension target to Xcode project
      #     script: |
      #       gem list -i xcodeproj || gem install xcodeproj
      #       ruby ios/scripts/add_widget_target.rb
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -maxdepth 2 -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --dart-define=PLANTNET_API_KEY=$PLANTNET_API_KEY \
            --dart-define=PERENUAL_API_KEY=$PERENUAL_API_KEY \
            --dart-define=OPENWEATHER_API_KEY=$OPENWEATHER_API_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
